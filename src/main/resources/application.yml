server:
  port: ${PORT:8080}

spring:
  application:
    name: BANKING-SYSTEM
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/banking_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Ramesh@2002}
  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:bankingsystemsecretkey1234567890abcdefghij}
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
    version: OPENAPI_3_0
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
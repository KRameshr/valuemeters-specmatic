# 1. Security Bypass
# Explicitly excluding these classes disables the default security filter chain
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# 2. Profiles
spring.profiles.active=test

# 3. SpringDoc/Swagger Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.version=OPENAPI_3_0

# 4. Database Initialization
# 'always' ensures the scripts run every time the context starts
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
# Ensure your data.sql is placed in src/test/resources
spring.sql.init.data-locations=classpath:data.sql

# 5. JPA/Hibernate Configuration
# Using 'create-drop' is perfect for clean contract testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 6. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/banking_test_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ramesh@2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 7. Server Settings
server.port=9000
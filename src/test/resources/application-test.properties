# SECURITY (disable for tests)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# SPRINGDOC (optional)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# DATABASE (H2 - TEST ONLY)
spring.datasource.url=jdbc:h2:mem:banking_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# SQL INIT (SAFE)
spring.sql.init.mode=always

# SERVER
server.port=9000

# SPECMATIC MODE
app.specmatic.mode=true